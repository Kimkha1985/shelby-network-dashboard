<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lua Ve Nha FINAL APP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06192f;
color:white;
}

.container{
display:grid;
grid-template-columns:250px 1fr 300px;
gap:12px;
padding:12px;
}

.card{
background:#0c223d;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px #00eaff;
}

.title{
color:#00eaff;
margin-bottom:6px;
}

input,button{
padding:6px;
margin:4px 0;
border-radius:6px;
border:none;
}

button{
background:#00eaff;
cursor:pointer;
}

.chat{
height:200px;
overflow:auto;
background:#000;
padding:5px;
border-radius:6px;
}

@media(max-width:1000px){
.container{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div>

<div class="card">
<div class="title">🎵 Music</div>
<input id="music">
<button onclick="play()">Play</button>
<iframe id="player" style="width:100%;height:140px;border:none"></iframe>
</div>

</div>

<!-- CENTER -->
<div>

<div class="card">
<div class="title">🕒 Clock</div>
<div id="clock"></div>
</div>

<div class="card">
<div class="title">💰 Portfolio</div>

<input id="coin" placeholder="BTC">
<input id="amount" placeholder="Số lượng">
<input id="buy" placeholder="Giá mua">

<button onclick="add()">Add</button>

<div id="list"></div>

</div>

<div class="card">
<div class="title">🔔 Alert</div>

<input id="aCoin" placeholder="BTC">
<input id="aPrice" placeholder="Giá target">

<button onclick="setAlert()">Set</button>

<div id="alerts"></div>

</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<div class="title">🤖 AI (gắn API key)</div>

<input id="apikey" placeholder="OpenAI API key">

<div id="chat" class="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

</div>

</div>

</div>

<script>

// CLOCK
setInterval(()=>{
clock.innerHTML=new Date().toLocaleTimeString("vi-VN")
},1000)

// MUSIC
function play(){
player.src=music.value
}

// GET PRICE BINANCE
async function price(symbol){
let r=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}USDT`)
let d=await r.json()
return parseFloat(d.price)
}

// PORTFOLIO
async function show(){
let list=JSON.parse(localStorage.getItem("pf")||"[]")
let html=""

for(let i of list){
let p=await price(i.coin)
let pnl=((p - i.buy) * i.amount).toFixed(2)

html+=`${i.coin} | ${i.amount} | Buy:${i.buy} | Now:${p} | PNL:${pnl}<br>`
}

listDiv.innerHTML=html
}

function add(){
let list=JSON.parse(localStorage.getItem("pf")||"[]")

list.push({
coin:coin.value.toUpperCase(),
amount:parseFloat(amount.value),
buy:parseFloat(buy.value)
})

localStorage.setItem("pf",JSON.stringify(list))
show()
}

let listDiv=document.getElementById("list")
show()
setInterval(show,15000)

// ALERT
function setAlert(){
let a=JSON.parse(localStorage.getItem("alert")||"[]")

a.push({
coin:aCoin.value.toUpperCase(),
price:parseFloat(aPrice.value)
})

localStorage.setItem("alert",JSON.stringify(a))
renderAlert()
}

function renderAlert(){
let a=JSON.parse(localStorage.getItem("alert")||"[]")
alerts.innerHTML=a.map(i=>`${i.coin} → ${i.price}`).join("<br>")
}
renderAlert()

// CHECK ALERT REAL
setInterval(async ()=>{
let a=JSON.parse(localStorage.getItem("alert")||"[]")

for(let i of a){
let p=await price(i.coin)

if(p >= i.price){
alert(`${i.coin} đạt ${p}`)
}
}
},10000)

// AI REAL
async function send(){
let key=document.getElementById("apikey").value
let msg=document.getElementById("msg").value

chat.innerHTML+=`<div>You: ${msg}</div>`

let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
})

let data=await res.json()
let reply=data.choices[0].message.content

chat.innerHTML+=`<div>AI: ${reply}</div>`
chat.scrollTop=chat.scrollHeight
}

</script>

</body>
</html>
