<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lua Ve Nha PRO++</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06192f;
color:white;
transition:0.3s;
}

.light{
background:#f5f5f5;
color:#111;
}

.container{
display:grid;
grid-template-columns:280px 1fr 280px;
gap:15px;
padding:15px;
}

.card{
background:rgba(0,0,0,0.6);
border-radius:15px;
padding:12px;
box-shadow:0 0 10px #00eaff;
}

.light .card{
background:white;
box-shadow:0 0 10px #ccc;
}

.title{
color:#00eaff;
margin-bottom:8px;
}

.clock{
font-size:40px;
text-align:center;
}

.crypto div{
display:flex;
justify-content:space-between;
padding:5px;
cursor:pointer;
}

button{
padding:8px;
border:none;
border-radius:8px;
background:#00eaff;
cursor:pointer;
}

input{
width:100%;
padding:6px;
margin-bottom:6px;
border-radius:6px;
border:none;
}

@media(max-width:1000px){
.container{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="card">

<div class="title">🎵 Music Player</div>

<input id="musicUrl" placeholder="Dán link YouTube embed...">
<button onclick="playMusic()">Play</button>

<iframe id="player" style="width:100%;height:180px;border:none;margin-top:10px"></iframe>

</div>

<!-- CENTER -->
<div>

<div class="card">
<div class="title">🕒 Giờ VN</div>
<div id="clock" class="clock"></div>
</div>

<div class="card">
<div class="title">🌤 Weather</div>
<div id="weather">Loading...</div>
</div>

<div class="card crypto">
<div class="title">₿ Crypto (click để lưu)</div>
<div onclick="saveCoin('BTC')">BTC <span id="btc"></span></div>
<div onclick="saveCoin('ETH')">ETH <span id="eth"></span></div>
<div onclick="saveCoin('BNB')">BNB <span id="bnb"></span></div>
<div onclick="saveCoin('OKB')">OKB <span id="okb"></span></div>
<div onclick="saveCoin('SUI')">SUI <span id="sui"></span></div>
</div>

<div class="card">
<div class="title">⭐ Coin yêu thích</div>
<div id="fav"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<div class="title">⚙️ Settings</div>
<button onclick="toggleTheme()">Đổi Dark/Light</button>
</div>

<div class="card">
<div class="title">📰 Crypto News</div>
<ul id="news"></ul>
</div>

</div>

</div>

<script>

// CLOCK
setInterval(()=>{
document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString("vi-VN");
},1000);

// MUSIC
function playMusic(){
let url=document.getElementById("musicUrl").value;
document.getElementById("player").src=url;
}

// CRYPTO
async function loadCrypto(){
let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd");
let d=await res.json();

btc.innerHTML=d.bitcoin.usd;
eth.innerHTML=d.ethereum.usd;
bnb.innerHTML=d.binancecoin.usd;
okb.innerHTML=d.okb.usd;
sui.innerHTML=d.sui.usd;
}
loadCrypto();
setInterval(loadCrypto,30000);

// WEATHER
async function weather(){
let r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true");
let d=await r.json();

weather.innerHTML = d.current_weather.temperature+"°C";
}
weather();

// NEWS
async function news(){
let r=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss");
let d=await r.json();

let html="";
d.items.slice(0,5).forEach(n=>{
html+=`<li><a href="${n.link}" target="_blank">${n.title}</a></li>`;
});
news.innerHTML=html;
}
news();

// SAVE COIN
function saveCoin(c){
let fav=JSON.parse(localStorage.getItem("fav")||"[]");
if(!fav.includes(c)){
fav.push(c);
localStorage.setItem("fav",JSON.stringify(fav));
showFav();
}
}

function showFav(){
let fav=JSON.parse(localStorage.getItem("fav")||"[]");
document.getElementById("fav").innerHTML=fav.join(", ");
}
showFav();

// THEME
function toggleTheme(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
