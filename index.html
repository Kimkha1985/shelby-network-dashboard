<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shelby ULTRA AI Dashboard</title>

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
}

/* MATRIX BACKGROUND */

canvas#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* LAYOUT */

#container{
display:flex;
width:100vw;
height:100vh;
}

#left{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

#right{
width:420px;
background:rgba(0,0,0,0.8);
border-left:1px solid cyan;
padding:20px;
overflow:auto;
}

#earth{
width:350px;
animation:spin 25s linear infinite;
filter:drop-shadow(0 0 20px cyan);
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* VIDEO */

#video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

/* AVATAR */

#avatar{
width:100px;
height:100px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 15px cyan;
}

/* BUTTON */

button{
background:cyan;
border:none;
padding:8px 14px;
margin:4px;
cursor:pointer;
font-weight:bold;
}

/* BOARD */

canvas#board{
background:#111;
border:1px solid cyan;
}

/* FLOWER */

.flower{
position:fixed;
top:-20px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

a{
color:cyan;
text-decoration:none;
display:block;
margin-top:8px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="container">

<div id="left">

<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<iframe id="video"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0"
allowfullscreen></iframe>

</div>

<div id="right">

<h2>Shelby Network</h2>

<img id="avatar"
src="https://i.imgur.com/4Z7b7YQ.png">

<p>AI Dashboard</p>

<button onclick="playMusic()">🎵 Mở nhạc</button>
<button onclick="stopMusic()">❌ Tắt video</button>
<button onclick="resetGame()">🔄 Reset game</button>

<h3>Giờ thế giới</h3>

<div id="timeVN"></div>
<div id="timeUS"></div>
<div id="timeJP"></div>
<div id="timeUK"></div>

<h3>Nhiệt độ</h3>

<div id="tempVN"></div>
<div id="tempUS"></div>
<div id="tempJP"></div>

<h3>Game Caro AI</h3>

<canvas id="board" width="400" height="400"></canvas>

<h3>Links</h3>

<a href="https://github.com/kimkha1985" target="_blank">
GitHub
</a>

<a href="https://x.com/" target="_blank">
X
</a>

</div>
</div>

<script>

/* MATRIX EFFECT */

const matrix=document.getElementById("matrix");
const ctxM=matrix.getContext("2d");

matrix.width=window.innerWidth;
matrix.height=window.innerHeight;

const letters="01";
const fontSize=14;
const columns=matrix.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function drawMatrix(){

ctxM.fillStyle="rgba(0,0,0,0.05)";
ctxM.fillRect(0,0,matrix.width,matrix.height);

ctxM.fillStyle="#0f0";
ctxM.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctxM.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>matrix.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(drawMatrix,50);

/* CLOCK */

function updateClock(){

timeVN.innerText="VN: "+new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"});
timeUS.innerText="New York: "+new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York"});
timeJP.innerText="Tokyo: "+new Date().toLocaleTimeString("ja-JP",{timeZone:"Asia/Tokyo"});
timeUK.innerText="London: "+new Date().toLocaleTimeString("en-GB",{timeZone:"Europe/London"});

}

setInterval(updateClock,1000);
updateClock();

/* WEATHER */

async function weather(){

let vn=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true").then(r=>r.json());

tempVN.innerText="VN: "+vn.current_weather.temperature+"°C";

}

weather();

/* FLOWER */

function flower(){

let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";

f.style.left=Math.random()*100+"vw";
f.style.animationDuration=6+Math.random()*10+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),15000);

}

setInterval(flower,800);

/* VIDEO */

function playMusic(){
earth.style.display="none";
video.style.display="block";
}

function stopMusic(){
earth.style.display="block";
video.style.display="none";
}

/* CARO GAME AI */

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

const size=15;
let board=[];

function initBoard(){

board=[];

for(let i=0;i<size;i++){
board[i]=[];

for(let j=0;j<size;j++){
board[i][j]=0;
}

}

draw();

}

function draw(){

ctx.clearRect(0,0,400,400);

let cell=400/size;

ctx.strokeStyle="cyan";

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

ctx.strokeRect(i*cell,j*cell,cell,cell);

if(board[i][j]==1){

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(i*cell+cell/2,j*cell+cell/2,cell/3,0,Math.PI*2);
ctx.fill();

}

if(board[i][j]==2){

ctx.strokeStyle="red";
ctx.beginPath();

ctx.moveTo(i*cell+5,j*cell+5);
ctx.lineTo(i*cell+cell-5,j*cell+cell-5);

ctx.moveTo(i*cell+cell-5,j*cell+5);
ctx.lineTo(i*cell+5,j*cell+cell-5);

ctx.stroke();

}

}
}

}

canvas.addEventListener("click",function(e){

let rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let cell=400/size;

let i=Math.floor(x/cell);
let j=Math.floor(y/cell);

if(board[i][j]==0){

board[i][j]=1;

aiMove();

draw();

}

});

function aiMove(){

let bestScore=-9999;
let move=null;

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(board[i][j]==0){

board[i][j]=2;

let score=evaluate();

board[i][j]=0;

if(score>bestScore){
bestScore=score;
move={i,j};
}

}

}
}

if(move){
board[move.i][move.j]=2;
}

}

function evaluate(){

let score=0;

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(board[i][j]==2) score+=check(i,j,2);
if(board[i][j]==1) score-=check(i,j,1);

}
}

return score;

}

function check(x,y,player){

let total=0;

const dir=[
[1,0],
[0,1],
[1,1],
[1,-1]
];

for(let d of dir){

let count=0;

for(let k=1;k<5;k++){

let nx=x+d[0]*k;
let ny=y+d[1]*k;

if(nx>=0 && ny>=0 && nx<size && ny<size){

if(board[nx][ny]==player){
count++;
}

}

}

total+=count*count;

}

return total;

}

function resetGame(){
initBoard();
}

initBoard();

</script>

</body>
</html>
