
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Luavenha V21 Dashboard</title>

<style> 

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1503264116251-35a269479413") no-repeat center;
background-size:cover;
color:white;
text-align:center;
}

.container{
background:rgba(0,0,0,0.7);
padding:20px;
}

.section{
margin-top:25px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:4px solid cyan;
box-shadow:0 0 25px cyan;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:8px;
}

iframe{
width:100%;
max-width:600px;
height:315px;
margin:10px;
}

#board{
display:grid;
grid-template-columns:repeat(15,30px);
justify-content:center;
}

.cell{
width:30px;
height:30px;
border:1px solid white;
font-size:20px;
line-height:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>LUAVENHA DASHBOARD V21</h1>

<img class="avatar" src="https://i.imgur.com/8Km9tLL.jpg">

<div class="section">

<h2>World Clock</h2>

<div id="clock"></div>

</div>

<div class="section">

<h2>Weather</h2>

<a href="https://www.accuweather.com">Open Weather</a>

</div>

<div class="section">

<h2>Crypto Market</h2>

<table id="crypto">

<tr>
<th>Coin</th>
<th>Price</th>
</tr>

</table>

</div>

<div class="section">

<h2>Football Center</h2>

<a href="https://www.livescore.com">Live Score</a><br>
<a href="https://www.flashscore.com">Match Results</a>

</div>

<div class="section">

<h2>Football News</h2>

<a href="https://www.bbc.com/sport/football">BBC Sport</a><br>
<a href="https://www.espn.com/soccer/">ESPN</a><br>
<a href="https://www.skysports.com/football">Sky Sports</a>

</div>

<div class="section">

<h2>Music Video</h2>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/KbEM5vf0XGI"></iframe>

</div>

<div class="section">

<h2>Game Caro</h2>

<div id="board"></div>

<button onclick="location.reload()">Reset</button>

</div>

</div>

<script>

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=

"Vietnam: "+now.toLocaleTimeString("en-US",{timeZone:"Asia/Ho_Chi_Minh"})+"<br>"+

"New York: "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})+"<br>"+

"London: "+now.toLocaleTimeString("en-US",{timeZone:"Europe/London"})+"<br>"+

"Madrid: "+now.toLocaleTimeString("en-US",{timeZone:"Europe/Madrid"})+"<br>"+

"Paris: "+now.toLocaleTimeString("en-US",{timeZone:"Europe/Paris"})+"<br>"+

"Berlin: "+now.toLocaleTimeString("en-US",{timeZone:"Europe/Berlin"})

}

setInterval(updateClock,1000)

updateClock()

async function crypto(){

let url="https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,ripple,okb,pi-network&vs_currencies=usd"

let r=await fetch(url)

let data=await r.json()

let table=document.getElementById("crypto")

table.innerHTML="<tr><th>Coin</th><th>Price</th></tr>"

table.innerHTML+=`<tr><td>BTC</td><td>$${data.bitcoin.usd}</td></tr>`
table.innerHTML+=`<tr><td>ETH</td><td>$${data.ethereum.usd}</td></tr>`
table.innerHTML+=`<tr><td>SOL</td><td>$${data.solana.usd}</td></tr>`
table.innerHTML+=`<tr><td>BNB</td><td>$${data.binancecoin.usd}</td></tr>`
table.innerHTML+=`<tr><td>XRP</td><td>$${data.ripple.usd}</td></tr>`
table.innerHTML+=`<tr><td>OKB</td><td>$${data.okb.usd}</td></tr>`
table.innerHTML+=`<tr><td>PI</td><td>$${data["pi-network"]?.usd||"-"}</td></tr>`

}

setInterval(crypto,60000)

crypto()

let size=15
let board=document.getElementById("board")
let grid=[]

for(let i=0;i<size;i++){

grid[i]=[]

for(let j=0;j<size;j++){

grid[i][j]=""

let cell=document.createElement("div")

cell.className="cell"

cell.onclick=()=>move(i,j)

board.appendChild(cell)

}

}

function getCell(x,y){

return board.children[x*size+y]

}

function move(x,y){

if(grid[x][y]!="")return

grid[x][y]="X"

getCell(x,y).innerText="X"

ai()

}

function ai(){

let best=null

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]==""){

best=[i,j]

}

}

}

if(best){

grid[best[0]][best[1]]="O"

getCell(best[0],best[1]).innerText="O"

}

}

</script>

</body>
</html>
