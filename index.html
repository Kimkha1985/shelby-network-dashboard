<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lua Ve Nha PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06192f;
color:white;
}

.container{
display:grid;
grid-template-columns:330px 1fr 330px;
gap:20px;
padding:20px;
}

.card{
background:rgba(0,0,0,0.6);
border-radius:18px;
padding:15px;
box-shadow:0 0 18px #00eaff;
}

.title{
color:#00eaff;
font-size:20px;
margin-bottom:10px;
}

iframe{
width:100%;
height:180px;
border:none;
border-radius:12px;
margin-bottom:12px;
}

.clock{
font-size:48px;
text-align:center;
color:#00ffff;
}

.crypto div{
display:flex;
justify-content:space-between;
padding:6px;
}

.earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.footer{
display:flex;
justify-content:center;
gap:30px;
padding:30px;
}

.footer a{
padding:12px 20px;
background:#0c223d;
border-radius:12px;
color:#00ffff;
text-decoration:none;
box-shadow:0 0 15px #00ffff;
}

</style>

</head>

<body>

<div class="container">

<!-- LEFT -->

<div class="card">

<div class="title">🎵 Music</div>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>
<iframe src="https://www.youtube.com/embed/dsaXgVd5cps"></iframe>
<iframe src="https://www.youtube.com/embed/w_kgRzsEXeM"></iframe>
<iframe src="https://www.youtube.com/embed/l3gNl5Pz1Z8"></iframe>

</div>


<!-- CENTER -->

<div>

<div class="card">

<div class="title">🕒 Giờ Việt Nam</div>

<div id="clock" class="clock"></div>

</div>

<div class="card">

<div class="title">🌍 Giờ Quốc Tế</div>

Tokyo: <span id="tokyo"></span><br>
New York: <span id="newyork"></span><br>
London: <span id="london"></span>

</div>

<div class="card">

<div class="title">🌤 Weather HCM</div>

<div id="weather"></div>

</div>

<div class="card crypto">

<div class="title">₿ Crypto Market</div>

<div>BTC <span id="btc"></span></div>
<div>ETH <span id="eth"></span></div>
<div>BNB <span id="bnb"></span></div>
<div>OKB <span id="okb"></span></div>
<div>SUI <span id="sui"></span></div>

</div>

<div class="card">

<div class="title">📊 Crypto Chart</div>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark"></iframe>

</div>

<div class="card">

<div class="title">🙏 Nhạc Phật</div>

<iframe src="https://www.youtube.com/embed/q--M-6STHlI"></iframe>
<iframe src="https://www.youtube.com/embed/Sk0Re5Wa-QI"></iframe>
<iframe src="https://www.youtube.com/embed/07QO_01Xl5s"></iframe>

</div>

<div class="card">

<div class="title">📅 Today</div>

<div id="date"></div>

</div>

</div>


<!-- RIGHT -->

<div>

<div class="card">

<div class="title">🌍 Earth</div>

<img class="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

</div>

<div class="card">

<div class="title">⚽ Football News</div>

<ul class="news"></ul>

</div>

<div class="card">

<div class="title">📰 Crypto News</div>

<ul id="cryptonews"></ul>

</div>

</div>

</div>

<div class="footer">

<a href="https://github.com/kimkha1985">
github.com/kimkha1985
</a>

<a href="https://x.com/ChauKimKha">
x.com/ChauKimKha
</a>

</div>


<script>

window.onload=function(){

function clock(){
document.getElementById("clock").innerHTML=
new Date().toLocaleTimeString("vi-VN")
}
setInterval(clock,1000)
clock()

function world(){

document.getElementById("tokyo").innerHTML=
new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Tokyo"})

document.getElementById("newyork").innerHTML=
new Date().toLocaleTimeString("vi-VN",{timeZone:"America/New_York"})

document.getElementById("london").innerHTML=
new Date().toLocaleTimeString("vi-VN",{timeZone:"Europe/London"})

}

setInterval(world,1000)
world()

document.getElementById("date").innerHTML=
new Date().toLocaleDateString("vi-VN")

async function crypto(){

let data=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd"
).then(r=>r.json())

btc.innerHTML=data.bitcoin.usd+" $"
eth.innerHTML=data.ethereum.usd+" $"
bnb.innerHTML=data.binancecoin.usd+" $"
okb.innerHTML=data.okb.usd+" $"
sui.innerHTML=data.sui.usd+" $"

}

crypto()
setInterval(crypto,30000)

}

</script>

</body>
</html>
