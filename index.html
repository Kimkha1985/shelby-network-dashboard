
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelby Network Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#070d1a;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar button{
width:100%;
padding:12px;
margin-top:10px;
background:#111827;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#22c55e;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
width:180px;
}

.card h3{
margin:0;
color:#9ca3af;
}

.card p{
font-size:24px;
color:#22c55e;
}

.chartbox{
margin-top:40px;
background:#111827;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Shelby</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('nodes')">Nodes</button>
<button onclick="show('network')">Network</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="show('settings')">Settings</button>

</div>

<div class="main">

<h1 id="title">Shelby Network Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Nodes</h3>
<p id="nodes">120</p>
</div>

<div class="card">
<h3>Active Peers</h3>
<p id="peers">500</p>
</div>

<div class="card">
<h3>Bandwidth</h3>
<p id="bandwidth">2.1 TB</p>
</div>

<div class="card">
<h3>Latency</h3>
<p id="latency">25 ms</p>
</div>

</div>

<div class="chartbox">
<canvas id="chart"></canvas>
</div>

</div>

<script>

function random(min,max){
return Math.floor(Math.random()*(max-min)+min)
}

setInterval(()=>{

document.getElementById("nodes").innerText=random(120,150)
document.getElementById("peers").innerText=random(500,650)
document.getElementById("bandwidth").innerText=(Math.random()*3).toFixed(2)+" TB"
document.getElementById("latency").innerText=random(15,40)+" ms"

},2000)

function show(page){

document.getElementById("title").innerText="Shelby "+page

}

const ctx=document.getElementById('chart')

new Chart(ctx,{
type:'line',
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
label:'Network Throughput',
data:[12,19,8,15,22,30,27],
borderColor:'#22c55e',
backgroundColor:'#22c55e33',
tension:0.4
}]
},
options:{
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
})

</script>

</body>
</html>
