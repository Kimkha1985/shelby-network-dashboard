<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lúa Về Nhà GOD</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.avatar{
width:150px;
height:150px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 25px white;
object-fit:cover;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:20px;
margin-top:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button{
background:#ff9800;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.cell{
background:white;
color:black;
font-size:30px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1>🌾 Lúa Về Nhà 👑</h1>

<img class="avatar"
src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">

<div class="card">

<h2>🎵 Music Player</h2>

<button onclick="playMusic()">Play</button>
<button onclick="pauseMusic()">Pause</button>
<button onclick="nextMusic()">Next</button>

<br><br>

<iframe id="music"

width="100%"
height="200"

src="https://www.youtube.com/embed/pRpeEdMmmQ0?enablejsapi=1"

allow="autoplay">

</iframe>

</div>

<div class="card">

<h2>🌡 Thời tiết TP.HCM</h2>

<p id="weather">Đang tải...</p>

</div>

<div class="card">

<h2>🌍 Giờ thế giới</h2>

<p id="clock"></p>

</div>

<div class="card">

<h2>🎮 Game Cờ Caro</h2>

<div class="grid" id="board"></div>

<button onclick="reset()">Chơi lại</button>

</div>

<div class="card">

<h2>💻 GitHub</h2>

<a href="https://github.com/Kimkha1985" target="_blank">
<button>Mở GitHub</button>
</a>

</div>

</div>

<script>

/* PLAYLIST */

let songs=[
"pRpeEdMmmQ0",
"EMb_IyLEQtw",
"qDQi31U9qrE"
]

let index=0

function loadSong(){
document.getElementById("music").src=
"https://www.youtube.com/embed/"+songs[index]
}

function nextMusic(){
index++
if(index>=songs.length) index=0
loadSong()
}

function playMusic(){
loadSong()
}

function pauseMusic(){
document.getElementById("music").src=""
}

/* CLOCK */

function clock(){

let now=new Date()

let vn=now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})
let tokyo=now.toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"})
let london=now.toLocaleTimeString("en-US",{timeZone:"Europe/London"})
let ny=now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})

document.getElementById("clock").innerHTML=

"🇻🇳 Việt Nam: "+vn+"<br>"+
"🇯🇵 Tokyo: "+tokyo+"<br>"+
"🇬🇧 London: "+london+"<br>"+
"🇺🇸 New York: "+ny

}

setInterval(clock,1000)

/* WEATHER */

async function weather(){

let url="https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true"

let res=await fetch(url)
let data=await res.json()

document.getElementById("weather").innerHTML=
"Nhiệt độ: "+data.current_weather.temperature+"°C"

}

weather()

/* CARO */

let board=document.getElementById("board")
let player="X"

function create(){

board.innerHTML=""

for(let i=0;i<9;i++){

let cell=document.createElement("div")
cell.className="cell"

cell.onclick=function(){

if(cell.innerHTML===""){

cell.innerHTML=player
player=player==="X"?"O":"X"

}

}

board.appendChild(cell)

}

}

function reset(){
player="X"
create()
}

create()

/* GALAXY */

let canvas=document.getElementById("stars")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

s.y+=0.3

if(s.y>canvas.height)s.y=0

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
