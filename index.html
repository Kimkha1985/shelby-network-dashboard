<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shelby AI Dashboard</title>

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
}

#container{
display:flex;
height:100vh;
width:100vw;
}

#left{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

#right{
width:420px;
background:#050505;
border-left:1px solid cyan;
padding:20px;
overflow:auto;
}

#earth{
width:320px;
animation:spin 30s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

#video{
position:absolute;
width:100%;
height:100%;
display:none;
top:0;
left:0;
}

#avatar{
width:90px;
height:90px;
border-radius:50%;
border:3px solid cyan;
}

button{
background:cyan;
border:none;
padding:8px 14px;
margin:4px;
cursor:pointer;
font-weight:bold;
}

canvas{
background:#111;
border:1px solid cyan;
}

a{
color:cyan;
display:block;
margin-top:8px;
text-decoration:none;
}

/* FLOWER */

.flower{
position:fixed;
top:-20px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div id="container">

<div id="left">

<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<iframe id="video"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0"
allowfullscreen></iframe>

</div>

<div id="right">

<h2>Shelby Network</h2>

<img id="avatar"
src="https://i.imgur.com/4Z7b7YQ.png">

<p>Admin Dashboard</p>

<button onclick="playMusic()">🎵 Mở nhạc</button>
<button onclick="stopMusic()">❌ Tắt video</button>
<button onclick="resetGame()">🔄 Reset game</button>

<h3>Giờ thế giới</h3>

<div id="timeVN"></div>
<div id="timeUS"></div>
<div id="timeJP"></div>
<div id="timeUK"></div>

<h3>Nhiệt độ</h3>

<div id="tempVN">Loading...</div>
<div id="tempUS"></div>
<div id="tempJP"></div>

<h3>Game Caro AI</h3>

<canvas id="board" width="400" height="400"></canvas>

<h3>Links</h3>

<a href="https://github.com/kimkha1985" target="_blank">GitHub</a>
<a href="https://x.com/" target="_blank">X</a>

</div>
</div>

<script>

/* CLOCK */

function updateClock(){

let vn=new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"});
let us=new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York"});
let jp=new Date().toLocaleTimeString("ja-JP",{timeZone:"Asia/Tokyo"});
let uk=new Date().toLocaleTimeString("en-GB",{timeZone:"Europe/London"});

timeVN.innerText="VN: "+vn;
timeUS.innerText="New York: "+us;
timeJP.innerText="Tokyo: "+jp;
timeUK.innerText="London: "+uk;

}

setInterval(updateClock,1000);
updateClock();

/* WEATHER */

async function weather(){

let vn=await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true").then(r=>r.json());
let us=await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74&current_weather=true").then(r=>r.json());
let jp=await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.68&longitude=139.69&current_weather=true").then(r=>r.json());

tempVN.innerText="VN: "+vn.current_weather.temperature+"°C";
tempUS.innerText="New York: "+us.current_weather.temperature+"°C";
tempJP.innerText="Tokyo: "+jp.current_weather.temperature+"°C";

}

weather();

/* FLOWERS */

function flower(){

let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";

f.style.left=Math.random()*100+"vw";
f.style.animationDuration=6+Math.random()*8+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),15000);

}

setInterval(flower,700);

/* VIDEO */

function playMusic(){

earth.style.display="none";
video.style.display="block";

}

function stopMusic(){

earth.style.display="block";
video.style.display="none";

}

/* CARO GAME */

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

const size=15;
let board=[];

function initBoard(){

board=[];

for(let i=0;i<size;i++){
board[i]=[];

for(let j=0;j<size;j++){
board[i][j]=0;
}

}

draw();

}

function draw(){

ctx.clearRect(0,0,400,400);

let cell=400/size;

ctx.strokeStyle="cyan";

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

ctx.strokeRect(i*cell,j*cell,cell,cell);

if(board[i][j]==1){

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(i*cell+cell/2,j*cell+cell/2,cell/3,0,Math.PI*2);
ctx.fill();

}

if(board[i][j]==2){

ctx.strokeStyle="red";
ctx.beginPath();
ctx.moveTo(i*cell+5,j*cell+5);
ctx.lineTo(i*cell+cell-5,j*cell+cell-5);
ctx.moveTo(i*cell+cell-5,j*cell+5);
ctx.lineTo(i*cell+5,j*cell+cell-5);
ctx.stroke();

}

}
}

}

/* PLAYER MOVE */

canvas.addEventListener("click",function(e){

let rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let cell=400/size;

let i=Math.floor(x/cell);
let j=Math.floor(y/cell);

if(board[i][j]==0){

board[i][j]=1;

aiMove();

draw();

}

});

/* AI HARD */

function aiMove(){

let bestScore=-9999;
let move=null;

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(board[i][j]==0){

board[i][j]=2;

let score=evaluate();

board[i][j]=0;

if(score>bestScore){
bestScore=score;
move={i,j};
}

}

}
}

if(move){
board[move.i][move.j]=2;
}

}

function evaluate(){

let score=0;

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(board[i][j]==2) score+=check(i,j,2);
if(board[i][j]==1) score-=check(i,j,1);

}
}

return score;

}

function check(x,y,player){

let total=0;

const dir=[
[1,0],
[0,1],
[1,1],
[1,-1]
];

for(let d of dir){

let count=0;

for(let k=1;k<5;k++){

let nx=x+d[0]*k;
let ny=y+d[1]*k;

if(nx>=0 && ny>=0 && nx<size && ny<size){

if(board[nx][ny]==player){
count++;
}

}

}

total+=count*count;

}

return total;

}

function resetGame(){
initBoard();
}

initBoard();

</script>

</body>
</html>
