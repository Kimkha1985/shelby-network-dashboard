<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lúa Về Nhà</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI;
color:white;
text-align:center;

background:url("background.jpg") center/cover no-repeat fixed;
}

.overlay{

background:rgba(0,0,0,0.65);
min-height:100vh;
padding:30px;

}

.avatar{

width:160px;
height:160px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
box-shadow:0 0 20px rgba(255,255,255,0.6);

}

h1{

margin-top:10px;
font-size:35px;

}

.card{

background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
border-radius:16px;
padding:20px;
margin:25px auto;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);

}

button{

padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff9800;
color:white;
}

button:hover{

background:#ffb74d;

}

/* CLOCK */

.clock{

font-size:18px;
margin:6px;

}

/* GAME */

.board{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:300px;
margin:auto;

}

.cell{

height:90px;
background:white;
color:black;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;

}

.cell:hover{

background:#eee;

}

</style>

</head>

<body>

<div class="overlay">

<h1>Lúa Về Nhà</h1>

<img src="avatar.jpg" class="avatar">

<!-- MUSIC -->

<div class="card">

<h2>🎵 Âm Nhạc</h2>

<button onclick="toggleMusic()" id="musicBtn">

▶ Bật nhạc

</button>

<div id="player" style="display:none;margin-top:15px;">

<iframe width="100%" height="300"
src="https://www.youtube.com/embed/qDQi31U9qrE?loop=1&playlist=qDQi31U9qrE"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

</div>

<!-- WEATHER -->

<div class="card">

<h2>🌦 Thời tiết TP.HCM</h2>

<p id="weather">Đang tải...</p>

</div>

<!-- WORLD CLOCK -->

<div class="card">

<h2>🌍 Giờ thế giới</h2>

<div class="clock" id="vn"></div>
<div class="clock" id="tokyo"></div>
<div class="clock" id="london"></div>
<div class="clock" id="ny"></div>

</div>

<!-- GAME -->

<div class="card">

<h2>🎮 Game Cờ Caro</h2>

<div class="board">

<div class="cell" onclick="move(this,0)"></div>
<div class="cell" onclick="move(this,1)"></div>
<div class="cell" onclick="move(this,2)"></div>

<div class="cell" onclick="move(this,3)"></div>
<div class="cell" onclick="move(this,4)"></div>
<div class="cell" onclick="move(this,5)"></div>

<div class="cell" onclick="move(this,6)"></div>
<div class="cell" onclick="move(this,7)"></div>
<div class="cell" onclick="move(this,8)"></div>

</div>

<br>

<button onclick="resetGame()">Chơi lại</button>

<p id="status"></p>

</div>

</div>

<script>

/* MUSIC */

function toggleMusic(){

let player=document.getElementById("player")
let btn=document.getElementById("musicBtn")

if(player.style.display==="none"){

player.style.display="block"
btn.innerText="⏸ Tắt nhạc"

}else{

player.style.display="none"
btn.innerText="▶ Bật nhạc"

}

}

/* WEATHER */

fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true")

.then(res=>res.json())

.then(data=>{

document.getElementById("weather").innerText=
"Nhiệt độ hiện tại: "+data.current_weather.temperature+"°C"

})

/* CLOCK */

function updateTime(){

const now=new Date()

document.getElementById("vn").innerText=
"Việt Nam: "+now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})

document.getElementById("tokyo").innerText=
"Tokyo: "+now.toLocaleTimeString("ja-JP",{timeZone:"Asia/Tokyo"})

document.getElementById("london").innerText=
"London: "+now.toLocaleTimeString("en-GB",{timeZone:"Europe/London"})

document.getElementById("ny").innerText=
"New York: "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})

}

setInterval(updateTime,1000)

updateTime()

/* GAME */

let board=["","","","","","","","",""]
let player="X"
let gameOver=false

function move(cell,index){

if(board[index]!=="" || gameOver) return

board[index]=player

cell.innerText=player

checkWin()

player = player==="X" ? "O":"X"

}

function checkWin(){

const win=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
]

for(let c of win){

if(board[c[0]] && board[c[0]]===board[c[1]] && board[c[1]]===board[c[2]]){

document.getElementById("status").innerText="Người thắng: "+board[c[0]]

gameOver=true

}

}

}

function resetGame(){

board=["","","","","","","","",""]

gameOver=false

document.querySelectorAll(".cell").forEach(c=>c.innerText="")

document.getElementById("status").innerText=""

}

</script>

</body>
</html>
