<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shelby Network V6</title>

<style>

body{
margin:0;
font-family:Arial;
color:#0ff;
text-align:center;
background:black;
overflow-x:hidden;
}

/* galaxy background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:url("https://upload.wikimedia.org/wikipedia/commons/5/5f/Hubble_ultra_deep_field.jpg");
background-size:cover;
animation:space 120s linear infinite;
z-index:-1;
}

@keyframes space{
from{transform:translate(0,0)}
to{transform:translate(-1000px,-500px)}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(0,0,0,0.7);
}

.logo{
height:45px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
}

a{
color:#0ff;
margin:10px;
text-decoration:none;
}

#clock{
font-size:18px;
margin-top:10px;
}

#weather{
margin:10px;
}

#earth{
width:260px;
animation:spin 25s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

#video{
display:none;
width:100%;
height:320px;
}

button{
margin:5px;
padding:8px 14px;
background:black;
border:1px solid #0ff;
color:#0ff;
cursor:pointer;
}

button:hover{
background:#0ff;
color:black;
}

/* caro */

#board{
display:grid;
grid-template-columns:repeat(15,25px);
justify-content:center;
margin-top:20px;
}

.cell{
width:25px;
height:25px;
border:1px solid #0ff;
line-height:25px;
font-size:18px;
}

</style>
</head>

<body>

<header>

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">

<div>
<a href="https://github.com" target="_blank">GitHub</a>
<a href="https://x.com" target="_blank">X</a>
</div>

<img class="avatar" src="https://i.imgur.com/4AiXzf8.jpeg">

</header>

<h2>🚀 Shelby Network Dashboard V6</h2>

<div id="clock"></div>

<div id="weather"></div>

<br>

<img id="earth" src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<iframe id="video" frameborder="0" allowfullscreen></iframe>

<br>

<button onclick="song1()">Song 1</button>
<button onclick="song2()">Song 2</button>
<button onclick="song3()">Song 3</button>
<button onclick="stopMusic()">Stop</button>

<h3>🎮 Game Caro</h3>

<div id="board"></div>

<button onclick="resetGame()">Reset Game</button>

<script>

/* clock */

function clock(){

let now=new Date()

document.getElementById("clock").innerHTML=

"🇻🇳 VN "+now.toLocaleTimeString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh"})+"<br>"+
"🇯🇵 Tokyo "+now.toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"})+"<br>"+
"🇺🇸 New York "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})+"<br>"+
"🇬🇧 London "+now.toLocaleTimeString("en-US",{timeZone:"Europe/London"})

}

setInterval(clock,1000)

/* weather */

fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true")
.then(r=>r.json())
.then(d=>{
document.getElementById("weather").innerHTML=
"🌡 Vietnam Temperature: "+d.current_weather.temperature+"°C"
})

/* music */

let video=document.getElementById("video")
let earth=document.getElementById("earth")

function song1(){

video.src="https://www.youtube.com/embed/dQw4w9WgXcQ"
earth.style.display="none"
video.style.display="block"

}

function song2(){

video.src="https://www.youtube.com/embed/3JZ4pnNtyxQ"
earth.style.display="none"
video.style.display="block"

}

function song3(){

video.src="https://www.youtube.com/embed/fLexgOxsZu0"
earth.style.display="none"
video.style.display="block"

}

function stopMusic(){

video.src=""
video.style.display="none"
earth.style.display="block"

}

/* flower effect */

function flowers(){

const f=document.createElement("div")

f.innerHTML="🌸"

f.style.position="fixed"
f.style.top="-10px"
f.style.left=Math.random()*window.innerWidth+"px"
f.style.fontSize="20px"

document.body.appendChild(f)

let fall=setInterval(()=>{

f.style.top=(f.offsetTop+1)+"px"

if(f.offsetTop>window.innerHeight){

clearInterval(fall)
f.remove()

}

},20)

}

setInterval(flowers,900)

/* caro */

const board=document.getElementById("board")
const size=15
let grid=[]

for(let i=0;i<size;i++){

grid[i]=[]

for(let j=0;j<size;j++){

grid[i][j]=""

let cell=document.createElement("div")
cell.className="cell"
cell.onclick=()=>move(i,j)

board.appendChild(cell)

}

}

function getCell(x,y){

return board.children[x*size+y]

}

function move(x,y){

if(grid[x][y]!="")return

grid[x][y]="X"
getCell(x,y).innerText="X"

if(checkWin(x,y,"X")){
alert("🏆 Bạn thắng!")
return
}

setTimeout(aiMove,200)

}

function aiMove(){

let bestScore=-9999
let move=null

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]==""){

grid[i][j]="O"

let score=evaluate()

grid[i][j]=""

if(score>bestScore){

bestScore=score
move=[i,j]

}

}

}

}

if(move){

grid[move[0]][move[1]]="O"
getCell(move[0],move[1]).innerText="O"

if(checkWin(move[0],move[1],"O")){

alert("🤖 AI thắng!")

}

}

}

function evaluate(){

let score=0

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]=="O")score+=1
if(grid[i][j]=="X")score-=1

}

}

return score

}

function checkWin(x,y,p){

return(

count(x,y,1,0,p)+count(x,y,-1,0,p)>=4||
count(x,y,0,1,p)+count(x,y,0,-1,p)>=4||
count(x,y,1,1,p)+count(x,y,-1,-1,p)>=4||
count(x,y,1,-1,p)+count(x,y,-1,1,p)>=4

)

}

function count(x,y,dx,dy,p){

let c=0
let i=x+dx
let j=y+dy

while(i>=0&&j>=0&&i<size&&j<size&&grid[i][j]==p){

c++
i+=dx
j+=dy

}

return c

}

function resetGame(){

location.reload()

}

</script>

</body>
</html>
