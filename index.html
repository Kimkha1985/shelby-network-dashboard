<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lua Ve Nha PRO MAX AI</title
.container{



.chat{
height:200px;
overflow:auto;
background:#000;
padding:5px;
border-radius:8px;
}

.msg{
margin:4px 0;
}

.user{color:#00ffff}
.ai{color:#00ff99}

@media(max-width:1000px){
.container{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div>

<div class="card">
<div class="title">🎵 Music</div>
<input id="music" placeholder="YouTube embed link">
<button onclick="play()">Play</button>
<iframe id="player" style="width:100%;height:150px;border:none"></iframe>
</div>

<div class="card">
<div class="title">⚙️ Settings</div>
<button onclick="toggleTheme()">Dark/Light</button>
</div>

</div>

<!-- CENTER -->
<div>

<div class="card">
<div class="title">🕒 Clock</div>
<div id="clock"></div>
</div>

<div class="card">
<div class="title">💰 Portfolio</div>

<input id="coin" placeholder="BTC">
<input id="amount" placeholder="Số lượng">
<input id="price" placeholder="Giá mua">

<button onclick="add()">Add</button>

<div id="list"></div>

</div>

<div class="card">
<div class="title">🔔 Alert</div>

<input id="alertCoin" placeholder="BTC">
<input id="alertPrice" placeholder="Giá target">

<button onclick="setAlert()">Set Alert</button>

<div id="alerts"></div>

</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<div class="title">🤖 AI Chat</div>

<div id="chat" class="chat"></div>

<input id="msg" placeholder="Nhập câu hỏi...">
<button onclick="send()">Send</button>

</div>

</div>

</div>

<script>

// CLOCK
setInterval(()=>{
clock.innerHTML=new Date().toLocaleTimeString("vi-VN")
},1000)

// MUSIC
function play(){
player.src=document.getElementById("music").value
}

// THEME
function toggleTheme(){
document.body.classList.toggle("light")
}

// PORTFOLIO
function add(){
let coin=document.getElementById("coin").value
let amount=document.getElementById("amount").value
let price=document.getElementById("price").value

let list=JSON.parse(localStorage.getItem("pf")||"[]")
list.push({coin,amount,price})
localStorage.setItem("pf",JSON.stringify(list))
show()
}

function show(){
let list=JSON.parse(localStorage.getItem("pf")||"[]")
let html=""
list.forEach(i=>{
html+=`${i.coin} | ${i.amount} | ${i.price}<br>`
})
document.getElementById("list").innerHTML=html
}
show()

// ALERT
function setAlert(){
let coin=alertCoin.value
let price=alertPrice.

function showAlert(){
let a=JSON.parse(localStorage.getItem("alert")||"[]")
let html=""
a.forEach(i=>{
html+=`${i.coin} → ${i.price}<br>`
})
alerts.innerHTML=html
}
showAlert()

// AI CHAT (FAKE)
function send(){
let msg=document.getElementById("msg").value

chat.innerHTML+=`<div class="msg user">You: ${msg}</div>`

let reply="AI: ";
if(msg.includes("btc")) reply+="BTC đang biến động mạnh 📈";
else if(msg.includes("hello")) reply+="Xin chào 😄";
else reply+="Mình đang học thêm 🤖";

chat.innerHTML+=`<div class="msg ai">${reply}</div>`
chat.scrollTop=chat.scrollHeight
}

</script>

</body>
</html>
