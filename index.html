<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelby Network V8</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:#00ffff;
background:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564");
background-size:cover;
}

h1{ text-shadow:0 0 20px cyan; }

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
}

#earth{
width:180px;
animation:spin 25s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

button{
margin:5px;
padding:8px 14px;
background:black;
color:cyan;
border:1px solid cyan;
cursor:pointer;
}

button:hover{
background:cyan;
color:black;
}

#videoBox{
display:none;
margin-top:10px;
}

iframe{
width:90%;
height:380px;
border:0;
}

#board{
display:grid;
grid-template-columns:repeat(12,34px);
justify-content:center;
margin-top:20px;
}

.cell{
width:34px;
height:34px;
border:1px solid cyan;
font-size:20px;
cursor:pointer;
}

.cell:hover{
background:#022;
}

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<h1>Shelby Network</h1>

<img src="avatar.jpg" class="avatar">

<br>

<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<div id="videoBox">
<iframe id="player"></iframe>
</div>

<br>

<button onclick="play('qDQi31U9qrE')">Song1</button>
<button onclick="play('EMb_IyLEQtw')">Song2</button>
<button onclick="play('pRpeEdMmmQ0')">Song3</button>
<button onclick="play('q--M-6STHlI')">Song4</button>
<button onclick="play('KbEM5vf0XGI')">Song5</button>
<button onclick="stopSong()">Stop</button>

<h3 id="clock"></h3>

<h2>Gomoku AI</h2>

<div id="board"></div>

<button onclick="resetGame()">Reset</button>

<br><br>

<a href="https://github.com/kimkha1985"><button>GitHub</button></a>
<a href="https://x.com"><button>X</button></a>

<script>

function play(id){
document.getElementById("videoBox").style.display="block"
document.getElementById("player").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1"
}

function stopSong(){
document.getElementById("player").src=""
}

function clock(){
let n=new Date()
document.getElementById("clock").innerText=
"Vietnam Time: "+n.toLocaleTimeString("vi-VN")
}
setInterval(clock,1000)

let board=document.getElementById("board")
let size=12
let grid=[]

for(let i=0;i<size;i++){
grid[i]=[]
for(let j=0;j<size;j++){

grid[i][j]=""

let c=document.createElement("div")
c.className="cell"

c.onclick=()=>move(i,j)

board.appendChild(c)

}
}

function getCell(x,y){
return board.children[x*size+y]
}

function move(x,y){

if(grid[x][y]!="") return

grid[x][y]="X"
getCell(x,y).innerText="X"

if(check(x,y,"X")){
alert("Bạn thắng!")
return
}

setTimeout(ai,200)

}

function ai(){

let best=-999
let move=null

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(grid[i][j]=="" && near(i,j)){

grid[i][j]="O"

let score=evaluate()

grid[i][j]=""

if(score>best){
best=score
move=[i,j]
}

}

}
}

if(move){

grid[move[0]][move[1]]="O"

getCell(move[0],move[1]).innerText="O"

if(check(move[0],move[1],"O")){
alert("AI thắng!")
}

}

}

function near(x,y){

for(let dx=-2;dx<=2;dx++){
for(let dy=-2;dy<=2;dy++){

let i=x+dx
let j=y+dy

if(i>=0 && j>=0 && i<size && j<size){

if(grid[i][j]!="") return true

}

}
}

return false
}

function evaluate(){

let score=0

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(grid[i][j]=="O") score+=scorePoint(i,j,"O")
if(grid[i][j]=="X") score-=scorePoint(i,j,"X")

}
}

return score
}

function scorePoint(x,y,p){

let total=0

let dirs=[[1,0],[0,1],[1,1],[1,-1]]

for(let d of dirs){

let line=count(x,y,d[0],d[1],p)+count(x,y,-d[0],-d[1],p)

if(line>=4) total+=10000
else if(line==3) total+=1000
else if(line==2) total+=100
else if(line==1) total+=10

}

return total
}

function check(x,y,p){

return(
count(x,y,1,0,p)+count(x,y,-1,0,p)>4||
count(x,y,0,1,p)+count(x,y,0,-1,p)>4||
count(x,y,1,1,p)+count(x,y,-1,-1,p)>4||
count(x,y,1,-1,p)+count(x,y,-1,1,p)>4
)

}

function count(x,y,dx,dy,p){

let c=0
let i=x+dx
let j=y+dy

while(i>=0 && j>=0 && i<size && j<size && grid[i][j]==p){
c++
i+=dx
j+=dy
}

return c
}

function resetGame(){
location.reload()
}

function flower(){

let f=document.createElement("div")
f.className="flower"
f.innerText="🌸"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=6+Math.random()*6+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),12000)

}

setInterval(flower,800)

</script>

</body>
</html>
