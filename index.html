<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lúa Về Nhà</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;

background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
overflow:hidden;

}

/* nền sao */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* hoa rơi */

.flower{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{

0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}

}

/* layout */

.container{

width:100vw;
height:100vh;

display:grid;

grid-template-columns:1fr 1fr 1fr;
gap:20px;

padding:20px;

}

/* card */

.card{

background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);

border-radius:15px;
padding:20px;

text-align:center;

}

/* avatar */

.avatar{

width:130px;
height:130px;

border-radius:50%;

border:3px solid white;

box-shadow:0 0 20px white;

}

/* globe */

.globe{

font-size:80px;
animation:spin 12s linear infinite;

}

@keyframes spin{

0%{transform:rotate(0)}
100%{transform:rotate(360deg)}

}

/* button */

button{

padding:10px 15px;

border:none;

border-radius:10px;

background:orange;

color:white;

font-weight:bold;

cursor:pointer;

margin:5px;

}

/* caro */

#board{

display:grid;

grid-template-columns:repeat(15,35px);
gap:4px;

justify-content:center;

margin-top:10px;

}

.cell{

width:35px;
height:35px;

background:white;
color:black;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;

cursor:pointer;

border-radius:5px;

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="card">

<h2>🌾 Lúa Về Nhà 👑</h2>

<br>

<img class="avatar"
src="https://i.imgur.com/1X6bR9K.png">

</div>

<div class="card">

<h2>🎵 Music</h2>

<button onclick="play(0)">Song 1</button>
<button onclick="play(1)">Song 2</button>
<button onclick="play(2)">Song 3</button>
<button onclick="stop()">Stop</button>

<br><br>

<iframe id="player"
width="100%"
height="200"
src=""
allow="autoplay">
</iframe>

</div>

<div class="card">

<h2>🌍 Earth</h2>

<div class="globe">🌎</div>

</div>

<div class="card">

<h2>🌡 Weather</h2>

<div>TP.HCM ~ 30°C</div>

</div>

<div class="card">

<h2>🌍 World Clock</h2>

<div id="clock"></div>

</div>

<div class="card">

<h2>🎮 Caro AI</h2>

<div id="board"></div>

<button onclick="resetGame()">Reset</button>

</div>

<div class="card">

<h2>🔗 Links</h2>

<a href="https://github.com/Kimkha1985" target="_blank">
<button>GitHub</button>
</a>

<a href="https://x.com/ChauKimKha" target="_blank">
<button>X</button>
</a>

</div>

</div>

<script>

/* hoa rơi */

for(let i=0;i<30;i++){

let flower=document.createElement("div")

flower.className="flower"

flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"

flower.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(flower)

}

/* music */

const songs=[

"https://www.youtube.com/embed/qDQi31U9qrE",

"https://www.youtube.com/embed/EMb_IyLEQtw",

"https://www.youtube.com/embed/pRpeEdMmmQ0"

]

function play(i){

document.getElementById("player").src=songs[i]+"?autoplay=1"

}

function stop(){

document.getElementById("player").src=""

}

/* clock */

function clock(){

let now=new Date()

document.getElementById("clock").innerHTML=

"🇻🇳 VN: "+now.toLocaleTimeString("vi-VN")+"<br>"+

"🇯🇵 Tokyo: "+now.toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"})+"<br>"+

"🇺🇸 NewYork: "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})+"<br>"+

"🇬🇧 London: "+now.toLocaleTimeString("en-GB",{timeZone:"Europe/London"})

}

setInterval(clock,1000)

clock()

/* CARO */

const size=15

const board=document.getElementById("board")

let grid=[]

for(let i=0;i<size;i++){

grid[i]=[]

for(let j=0;j<size;j++){

grid[i][j]=""

let cell=document.createElement("div")

cell.className="cell"

cell.onclick=()=>move(i,j)

board.appendChild(cell)

}

}

function getCell(x,y){

return board.children[x*size+y]

}

function move(x,y){

if(grid[x][y]!="") return

grid[x][y]="X"

getCell(x,y).innerText="X"

if(check(x,y,"X")){

alert("Bạn thắng!")

return

}

ai()

}

function ai(){

let empty=[]

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]==""){

empty.push([i,j])

}

}

}

if(empty.length==0)return

let m=empty[Math.floor(Math.random()*empty.length)]

grid[m[0]][m[1]]="O"

getCell(m[0],m[1]).innerText="O"

if(check(m[0],m[1],"O")){

alert("AI thắng!")

}

}

function check(x,y,p){

return(

count(x,y,1,0,p)+count(x,y,-1,0,p)>4||

count(x,y,0,1,p)+count(x,y,0,-1,p)>4||

count(x,y,1,1,p)+count(x,y,-1,-1,p)>4||

count(x,y,1,-1,p)+count(x,y,-1,1,p)>4

)

}

function count(x,y,dx,dy,p){

let c=0

let i=x+dx
let j=y+dy

while(i>=0&&j>=0&&i<size&&j<size&&grid[i][j]==p){

c++

i+=dx
j+=dy

}

return c

}

function resetGame(){

location.reload()

}

</script>

</body>
</html>
