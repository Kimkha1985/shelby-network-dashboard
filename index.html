<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lúa Về Nhà</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* nền sao */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* layout full screen */

.container{

width:100vw;
height:100vh;

display:grid;

grid-template-columns:1fr 1fr 1fr;
grid-template-rows:auto auto auto;

gap:20px;

padding:20px;

}

/* card */

.card{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

border-radius:15px;

padding:20px;

text-align:center;

}

/* avatar */

.avatar{

width:120px;
height:120px;

border-radius:50%;

border:3px solid white;

box-shadow:0 0 25px white;

}

/* globe */

.globe{

font-size:80px;

animation:spin 10s linear infinite;

}

@keyframes spin{

0%{transform:rotate(0)}
100%{transform:rotate(360deg)}

}

/* buttons */

button{

padding:10px 15px;

border:none;

border-radius:10px;

background:orange;

color:white;

font-weight:bold;

cursor:pointer;

margin:5px;

}

/* caro board */

#board{

display:grid;

grid-template-columns:repeat(12,40px);

gap:5px;

justify-content:center;

margin-top:10px;

}

.cell{

width:40px;
height:40px;

background:white;

color:black;

font-size:20px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

border-radius:5px;

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="card">

<h2>🌾 Lúa Về Nhà 👑</h2>

<br>

<img src="logo.jpg" class="avatar">

</div>

<div class="card">

<h2>🎵 Music</h2>

<button onclick="play(0)">Song 1</button>

<button onclick="play(1)">Song 2</button>

<button onclick="play(2)">Song 3</button>

<button onclick="stop()">Stop</button>

<br><br>

<iframe id="player"

width="100%"
height="200"

src=""

allow="autoplay">

</iframe>

</div>

<div class="card">

<h2>🌍 Earth</h2>

<div class="globe">🌎</div>

</div>

<div class="card">

<h2>🌡 Weather</h2>

<div>TP.HCM ~ 30°C</div>

</div>

<div class="card">

<h2>🌍 World Clock</h2>

<div id="clock"></div>

</div>

<div class="card">

<h2>🎮 Caro AI</h2>

<div id="board"></div>

<button onclick="reset()">Reset</button>

</div>

<div class="card">

<h2>🔗 Links</h2>

<a href="https://github.com/Kimkha1985" target="_blank">

<button>GitHub</button>

</a>

<a href="https://x.com/ChauKimKha" target="_blank">

<button>X</button>

</a>

</div>

</div>

<script>

/* MUSIC */

const songs=[

"https://www.youtube.com/embed/qDQi31U9qrE",

"https://www.youtube.com/embed/EMb_IyLEQtw",

"https://www.youtube.com/embed/pRpeEdMmmQ0"

]

function play(i){

document.getElementById("player").src=songs[i]+"?autoplay=1"

}

function stop(){

document.getElementById("player").src=""

}

/* CLOCK */

function clock(){

let now=new Date()

document.getElementById("clock").innerHTML=

"VN: "+now.toLocaleTimeString("vi-VN")+"<br>"+

"Tokyo: "+now.toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"})+"<br>"+

"NewYork: "+now.toLocaleTimeString("en-US",{timeZone:"America/New_York"})+"<br>"+

"London: "+now.toLocaleTimeString("en-GB",{timeZone:"Europe/London"})

}

setInterval(clock,1000)

clock()

/* CARO */

const board=document.getElementById("board")

let cells=[]

for(let i=0;i<144;i++){

let cell=document.createElement("div")

cell.className="cell"

cell.onclick=()=>{

if(cell.innerText==""){

cell.innerText="X"

ai()

}

}

board.appendChild(cell)

cells.push(cell)

}

function ai(){

let empty=cells.filter(c=>c.innerText=="")

if(empty.length==0)return

let move=empty[Math.floor(Math.random()*empty.length)]

move.innerText="O"

}

function reset(){

cells.forEach(c=>c.innerText="")

}

/* STAR BACKGROUND */

const canvas=document.getElementById("stars")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth

canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.fillRect(s.x,s.y,s.size,s.size)

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
