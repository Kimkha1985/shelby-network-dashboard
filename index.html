<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lua Ve Nha PRO MAX</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06192f;
color:white;
}

.container{
display:grid;
grid-template-columns:300px 1fr 300px;
gap:15px;
padding:15px;
}

.card{
background:rgba(0,0,0,0.6);
border-radius:18px;
padding:15px;
box-shadow:0 0 15px #00eaff;
}

.title{
color:#00eaff;
margin-bottom:10px;
}

iframe{
width:100%;
height:180px;
border:none;
border-radius:12px;
margin-bottom:10px;
}

.clock{
font-size:42px;
text-align:center;
color:#00ffff;
}

.crypto div{
display:flex;
justify-content:space-between;
padding:5px;
}

.earth{
width:100%;
border-radius:50%;
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.footer{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.footer a{
padding:10px 15px;
background:#0c223d;
border-radius:10px;
color:#00ffff;
text-decoration:none;
box-shadow:0 0 10px #00ffff;
}

@media(max-width:1000px){
.container{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="card">
<div class="title">🎵 Music</div>

<iframe src="https://www.youtube.com/embed/qDQi31U9qrE"></iframe>
<iframe src="https://www.youtube.com/embed/EMb_IyLEQtw"></iframe>
<iframe src="https://www.youtube.com/embed/pRpeEdMmmQ0"></iframe>

</div>

<!-- CENTER -->
<div>

<div class="card">
<div class="title">🕒 Giờ Việt Nam</div>
<div id="clock" class="clock"></div>
</div>

<div class="card">
<div class="title">🌍 Giờ Quốc Tế</div>
Tokyo: <span id="tokyo"></span><br>
New York: <span id="newyork"></span><br>
London: <span id="london"></span>
</div>

<div class="card">
<div class="title">🌤 Weather HCM</div>
<div id="weather">Loading...</div>
</div>

<div class="card crypto">
<div class="title">₿ Crypto Market</div>
<div>BTC <span id="btc">...</span></div>
<div>ETH <span id="eth">...</span></div>
<div>BNB <span id="bnb">...</span></div>
<div>OKB <span id="okb">...</span></div>
<div>SUI <span id="sui">...</span></div>
</div>

<div class="card">
<div class="title">📊 BTC Chart</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark"></iframe>
</div>

<div class="card">
<div class="title">📅 Today</div>
<div id="date"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<div class="title">🌍 Earth</div>
<img class="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

<div class="card">
<div class="title">📰 Crypto News</div>
<ul id="cryptonews"></ul>
</div>

</div>

</div>

<div class="footer">

<a href="https://github.com/kimkha1985" target="_blank">GitHub</a>
<a href="https://x.com/ChauKimKha" target="_blank">X</a>

</div>

<script>

window.onload=function(){

// CLOCK VN
function clock(){
document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString("vi-VN");
}
setInterval(clock,1000);
clock();

// WORLD TIME
function world(){
document.getElementById("tokyo").innerHTML =
new Date().toLocaleTimeString("vi-VN",{timeZone:"Asia/Tokyo"});

document.getElementById("newyork").innerHTML =
new Date().toLocaleTimeString("vi-VN",{timeZone:"America/New_York"});

document.getElementById("london").innerHTML =
new Date().toLocaleTimeString("vi-VN",{timeZone:"Europe/London"});
}
setInterval(world,1000);
world();

// DATE
document.getElementById("date").innerHTML =
new Date().toLocaleDateString("vi-VN");

// CRYPTO
async function crypto(){
try{
let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,okb,sui&vs_currencies=usd");
let data = await res.json();

document.getElementById("btc").innerHTML = data.bitcoin.usd + " $";
document.getElementById("eth").innerHTML = data.ethereum.usd + " $";
document.getElementById("bnb").innerHTML = data.binancecoin.usd + " $";
document.getElementById("okb").innerHTML = data.okb.usd + " $";
document.getElementById("sui").innerHTML = data.sui.usd + " $";

}catch(e){
console.log("Crypto lỗi", e);
}
}
crypto();
setInterval(crypto,30000);

// WEATHER (HCM)
async function weather(){
try{
let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true");
let data = await res.json();

document.getElementById("weather").innerHTML =
data.current_weather.temperature + "°C | Gió " +
data.current_weather.windspeed + " km/h";

}catch(e){
document.getElementById("weather").innerHTML="Không load được";
}
}
weather();

// CRYPTO NEWS
async function news(){
try{
let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss");
let data = await res.json();

let html="";
data.items.slice(0,5).forEach(n=>{
html+=`<li><a href="${n.link}" target="_blank" style="color:#00ffff">${n.title}</a></li>`;
});

document.getElementById("cryptonews").innerHTML = html;

}catch(e){
console.log("News lỗi",e);
}
}
news();

}

</script>

</body>
</html>
