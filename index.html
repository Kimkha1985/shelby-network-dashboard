<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelby Network V7 ULTRA</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:#00ffff;
background:
radial-gradient(circle at 20% 20%,#001,#000 60%),
url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564");
background-size:cover;
overflow-x:hidden;
}

h1{
text-shadow:0 0 20px cyan;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 30px cyan;
}

#earth{
width:200px;
margin-top:10px;
animation:spin 25s linear infinite;
filter:drop-shadow(0 0 20px cyan);
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

button{
margin:6px;
padding:8px 14px;
background:#000;
color:#0ff;
border:1px solid #0ff;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0ff;
color:#000;
}

#videoBox{
display:none;
margin-top:15px;
}

iframe{
width:90%;
height:420px;
border:none;
}

#clockBox{
margin-top:10px;
font-size:18px;
}

#board{
display:grid;
grid-template-columns:repeat(15,32px);
justify-content:center;
margin-top:20px;
}

.cell{
width:32px;
height:32px;
border:1px solid cyan;
font-size:20px;
cursor:pointer;
}

.cell:hover{
background:#022;
}

#footer{
margin-top:40px;
padding-bottom:30px;
}

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<h1>Shelby Network Dashboard</h1>

<img src="avatar.jpg" class="avatar">

<br>

<img id="earth"
src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<div id="videoBox">
<iframe id="player" allow="autoplay"></iframe>
</div>

<br>

<button onclick="song('qDQi31U9qrE')">Song 1</button>
<button onclick="song('EMb_IyLEQtw')">Song 2</button>
<button onclick="song('pRpeEdMmmQ0')">Song 3</button>
<button onclick="song('q--M-6STHlI')">Song 4</button>
<button onclick="song('KbEM5vf0XGI')">Song 5</button>
<button onclick="stopSong()">Stop</button>

<div id="clockBox">
<div id="vnClock"></div>
<div id="worldClock"></div>
<div id="weather"></div>
</div>

<h2>Gomoku AI Ultra</h2>

<div id="board"></div>

<button onclick="resetGame()">Reset Game</button>

<div id="footer">

<a href="https://github.com/kimkha1985">
<button>GitHub</button>
</a>

<a href="https://x.com">
<button>X</button>
</a>

</div>

<script>

function song(id){
document.getElementById("videoBox").style.display="block"
document.getElementById("player").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1"
}

function stopSong(){
document.getElementById("player").src=""
}

function updateClock(){

let now=new Date()

document.getElementById("vnClock").innerText=
"Vietnam: "+now.toLocaleTimeString("vi-VN")

document.getElementById("worldClock").innerText=
"UTC: "+now.toUTCString()

}

setInterval(updateClock,1000)

async function weather(){

try{

let r=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=10.82&longitude=106.63&current_weather=true"
)

let d=await r.json()

document.getElementById("weather").innerText=
"Temp Vietnam: "+d.current_weather.temperature+"°C"

}catch(e){}

}

weather()

let board=document.getElementById("board")
let size=15
let grid=[]

for(let i=0;i<size;i++){

grid[i]=[]

for(let j=0;j<size;j++){

grid[i][j]=""

let c=document.createElement("div")
c.className="cell"
c.onclick=()=>move(i,j)

board.appendChild(c)

}

}

function getCell(x,y){

return board.children[x*size+y]

}

function move(x,y){

if(grid[x][y]!="") return

grid[x][y]="X"
getCell(x,y).innerText="X"

if(check(x,y,"X")){
alert("Bạn thắng!")
return
}

ai()

}

function ai(){

let best=-Infinity
let move=null

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]==""){

grid[i][j]="O"

let s=minimax(2,false)

grid[i][j]=""

if(s>best){
best=s
move=[i,j]
}

}

}

}

if(move){

grid[move[0]][move[1]]="O"

getCell(move[0],move[1]).innerText="O"

if(check(move[0],move[1],"O")){
alert("AI thắng!")
}

}

}

function minimax(depth,isMax){

if(depth==0) return evaluate()

if(isMax){

let best=-Infinity

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]==""){

grid[i][j]="O"

best=Math.max(best,minimax(depth-1,false))

grid[i][j]=""

}

}

}

return best

}else{

let best=Infinity

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]==""){

grid[i][j]="X"

best=Math.min(best,minimax(depth-1,true))

grid[i][j]=""

}

}

}

return best

}

}

function evaluate(){

let score=0

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

if(grid[i][j]=="O") score+=scorePoint(i,j,"O")

if(grid[i][j]=="X") score-=scorePoint(i,j,"X")

}

}

return score

}

function scorePoint(x,y,p){

let total=0

let dirs=[[1,0],[0,1],[1,1],[1,-1]]

for(let d of dirs){

let line=count(x,y,d[0],d[1],p)+count(x,y,-d[0],-d[1],p)

if(line>=4) total+=10000
else if(line==3) total+=1000
else if(line==2) total+=100
else if(line==1) total+=10

}

return total

}

function check(x,y,p){

return(
count(x,y,1,0,p)+count(x,y,-1,0,p)>4||
count(x,y,0,1,p)+count(x,y,0,-1,p)>4||
count(x,y,1,1,p)+count(x,y,-1,-1,p)>4||
count(x,y,1,-1,p)+count(x,y,-1,1,p)>4
)

}

function count(x,y,dx,dy,p){

let c=0
let i=x+dx
let j=y+dy

while(i>=0&&j>=0&&i<size&&j<size&&grid[i][j]==p){

c++
i+=dx
j+=dy

}

return c

}

function resetGame(){
location.reload()
}

function flower(){

let f=document.createElement("div")

f.className="flower"
f.innerText="🌸"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=6+Math.random()*5+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),10000)

}

setInterval(flower,600)

</script>

</body>
</html>
